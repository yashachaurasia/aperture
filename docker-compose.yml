services:
  db:
    image: postgis/postgis:16-3.4
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-aperture_db}
      POSTGRES_USER: ${POSTGRES_USER:-aperture_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aperture}
    ports:
      - "5435:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-aperture_user} -d ${POSTGRES_DB:-aperture_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    environment:
      DJANGO_SETTINGS_MODULE: config.settings
      POSTGRES_DB: ${POSTGRES_DB:-aperture_db}
      POSTGRES_USER: ${POSTGRES_USER:-aperture_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-aperture}
      DB_HOST: db
      DB_PORT: 5432
      SECRET_KEY: ${SECRET_KEY:-dev-secret-key}
      DEBUG: ${DEBUG:-true}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:3005,http://127.0.0.1:3005}
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "3005:3005"
    environment:
      REACT_APP_API_URL: ${REACT_APP_API_URL:-http://localhost:8000}
      PORT: ${PORT:-3005}
      WDS_SOCKET_PORT: 0
    depends_on:
      - backend

volumes:
  postgres_data: